<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twittradio.com - Tu estación de radio favorita</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b2025;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            background-color: rgba(11, 32, 37, 0.85);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo {
            max-width: 300px;
            height: auto;
            display: block;
        }

        .content {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #ffc100;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-block;
            padding: 16px 48px;
            font-size: 1.3rem;
            color: #0b2025;
            background-color: #ffc100;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 193, 0, 0.4);
        }

        .cta-button:hover {
            background-color: #f0c030;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 193, 0, 0.6);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .cta-button {
                padding: 14px 40px;
                font-size: 1.1rem;
            }

            .logo {
                max-width: 250px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.6rem;
            }

            .cta-button {
                padding: 12px 32px;
                font-size: 1rem;
            }

            .logo {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="logo-container">
            <img src="logo.png" alt="Twittradio Logo" class="logo">
        </div>

        <div class="content">
            <h1>Bienvenidos a Twittradio</h1>
            <p>Sintoniza tu mente</p>
            <a href="https://escucha.twittradio.com" class="cta-button">Escuchar Ahora</a>
        </div>
    </div>
</body>
</html>
